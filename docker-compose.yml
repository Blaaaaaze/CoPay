services:
  api:
    build: ./backend
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      JWT_SECRET: ${JWT_SECRET:-copay-dev-secret-change-in-production}
      DATA_DIR: /app/data
      # OCR-сервис из этого же docker-compose
      RECEIPT_OCR_BASE_URL: http://receipt-ocr:8000
    volumes:
      - copay-data:/app/data
    expose:
      - "8000"
    depends_on:
      receipt-ocr:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped
  receipt-ocr:
    build: ./receipt-ocr
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
  web:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
volumes:
  copay-data:
