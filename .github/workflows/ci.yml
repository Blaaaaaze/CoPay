name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Backend + Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Django system check
        working-directory: backend
        run: |
          python manage.py check
          python manage.py migrate --noinput

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-compose:
    name: Full stack docker-compose
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Wait for web + API via nginx
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8081/api/health >/dev/null; then
              echo "API is healthy through web gateway"
              exit 0
            fi
            echo "Waiting for service startup... ($i/40)"
            sleep 10
          done
          echo "Service did not become healthy in time"
          exit 1

      - name: Check OCR health endpoint through web gateway
        run: curl -fsS http://localhost:8081/api/receipts/health

      - name: Print docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: docker compose down -v --remove-orphans
